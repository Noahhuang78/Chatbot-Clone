version: "3.9"

services:
  web:
    build: .
    container_name: web
    ports: 
      - "8080:8080"
    environment:
      - PORT=8080
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  worker:
    build: .
    container_name: worker
    command: celery -A celery_worker.celery worker --pool=solo --loglevel=info
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on: 
      - redis

  redis:
    image: redis:7
    container_name: redis
    ports:
      - "6379:6379"

